const friendlyError = (err) => {
  const msg = String((err && err.message) || err || '');
  const status = err && err.status;
  if (status === 401 || /authentication|invalid x-api-key/i.test(msg)) return 'APIキーが正しくありません。設定画面でキーを確認してください';

// ===== IndexedDB（写真本体の保存先。localStorage の 5MB 制限を回避） =====
const IDB_NAME = 'taiyo_fukushi_photos_v1';
const IDB_STORE = 'photos';
let idbPromise = null;
function idbOpen() {
  if (!idbPromise) {
    idbPromise = new Promise((resolve, reject) => {
      const rq = indexedDB.open(IDB_NAME, 1);
      rq.onupgradeneeded = () => { rq.result.createObjectStore(IDB_STORE); };
      rq.onsuccess = () => resolve(rq.result);
      rq.onerror = () => reject(rq.error);
    });
  }
  return idbPromise;
}
async function idbPut(id, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGet(id) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const rq = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(id);
    rq.onsuccess = () => resolve(rq.result || null);
    rq.onerror = () => reject(rq.error);
  });
}
async function idbDel(id) {
  const db = await idbOpen();
  return new Promise((resolve) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => resolve(false);
  });
}
async function idbKeys() {
  const db = await idbOpen();
  return new Promise((resolve) => {
    const rq = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).getAllKeys();
    rq.onsuccess = () => resolve(rq.result || []);
    rq.onerror = () => resolve([]);
  });
}

// ===== 写真処理: EXIF向き補正込みで長辺リサイズ + JPEG圧縮 =====
// （最近のブラウザは <img> デコード時に EXIF の向きを自動適用する）
function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('画像を読み込めません'));
    img.src = src;
  });
}
function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result);
    fr.onerror = () => reject(fr.error);
    fr.readAsDataURL(file);
  });
}
async function processImageFile(file, maxEdge = 1400, quality = 0.82) {
  const raw = await readAsDataURL(file);
  const img = await loadImage(raw);
  const w = img.naturalWidth, h = img.naturalHeight;
  const scale = Math.min(1, maxEdge / Math.max(w, h));
  const cw = Math.max(1, Math.round(w * scale));
  const ch = Math.max(1, Math.round(h * scale));
  const canvas = document.createElement('canvas');
  canvas.width = cw; canvas.height = ch;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cw, ch);
  ctx.drawImage(img, 0, 0, cw, ch);
  return canvas.toDataURL('image/jpeg', quality);
}

// ===== PDF（レンタル単位数報告書・カタログ）からのテキスト抽出 =====
// 日本語PDF（CIDフォント）のテキスト抽出には既定CMapが必要。
// ビルド時に window.__PDF_CMAPS へ同梱し、ここからインメモリ供給する。
class InlineCMapReaderFactory {
  async fetch({ name }) {
    const b64 = (window.__PDF_CMAPS || {})[name];
    if (!b64) throw new Error('CMap not bundled: ' + name);
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    // pdf.js v4 の戻り値仕様: { cMapData, isCompressed }（v3の compressionType から変更）
    return { cMapData: arr, isCompressed: true };
  }
}

async function pdfToLines(arrayBuffer, onProgress) {
  const doc = await pdfjsLib.getDocument({
    data: arrayBuffer,
    CMapReaderFactory: InlineCMapReaderFactory,
    useWorkerFetch: false,
    isEvalSupported: false, // 多層防御: フォント処理でのeval相当の実行経路を無効化（CVE-2024-4367系の攻撃面を削減）
  }).promise;
  // spans: 座標つきテキスト片 {text, page, x, y}。
  // 多段組カタログでは行順の近さ≠視覚的な近さのため、座標を保持して空間探索に使う。
  const spans = [];
  for (let p = 1; p <= doc.numPages; p++) {
    if (onProgress) onProgress(`PDF解析中… ${p}/${doc.numPages}ページ`);
    const page = await doc.getPage(p);
    const tc = await page.getTextContent();
    const rows = new Map();
    for (const item of tc.items) {
      if (!item.str || !item.str.trim()) continue;
      const y = Math.round(item.transform[5] / 3) * 3;
      if (!rows.has(y)) rows.set(y, []);
      rows.get(y).push({ x: item.transform[4], w: item.width || item.str.length * 4, str: item.str });
    }
    const ys = [...rows.keys()].sort((a, b) => b - a);
    for (const y of ys) {
      // x方向の大きなギャップでカラム分割。小さなギャップは空白なしで結合（日本語の分断防止）
      const items = rows.get(y).sort((a, b) => a.x - b.x);
      let seg = [], prevEnd = null;
      const flush = () => {
        if (seg.length) {
          let out = '', pe = null;
          for (const it of seg) {
            if (pe !== null && it.x - pe > 2) out += ' ';
            out += it.str; pe = it.x + it.w;
          }
          const t = out.replace(/\s+/g, ' ').trim();
          if (t) spans.push({ text: t, page: p, x: seg[0].x, y });
        }
        seg = [];
      };
      for (const it of items) {
        if (prevEnd !== null && it.x - prevEnd > 18) flush();
        seg.push(it); prevEnd = it.x + it.w;
      }
      flush();
    }
    // fake worker（メインスレッド実行）のため、ページごとにUIへ制御を返す
    await new Promise(r => setTimeout(r, 0));
  }
  return { spans, lines: spans.map(s => s.text), numPages: doc.numPages, doc };
}

const TAIS_RE = /(\d{5})\s*-\s*(\d{6})/;
const UNITS_RE = /([1-9][\d,]{0,6})\s*単位/;
const HAS_JA_RE = /[ぁ-んァ-ヶ一-龠ー]{3,}/; // 日本語3文字以上（型番・英数トークンを商品名から除外）
const PRICE_RE = /[￥¥]?\d{1,3}(?:,\d{3})+/;  // カンマ区切りの価格らしき数値
const NUM_LIKE_RE = /^[¥￥]?[\d,]+$/;         // 数値だけのセル（Excel/CSVの列判定用）

const NOISE_WORD_RE = /[￥¥●／：]|税抜|税込|非課税|軽減|価格|在庫商品|受注生産|替えゴム|パイプ径|生産国|材質|重さ|サイズ|展開|注文|お問合せ|型番|ワイズ|片足|両足|脚部|グリップ内径|セット内容|最大使用者/;

// 色名だけの行は商品名候補から除外（カタログのカラーバリエーション表記）
const COLOR_ONLY_RE = /^(ブラック|ブルー|レッド|ホワイト|グリーン|ネイビー|ブラウン|ピンク|イエロー|グレー|グレイ|ワインレッド|ボルドー|シルバー|ベージュ|オレンジ|パープル|エンジ|カーボン柄|黒|茶|紺|赤|青|緑|紫)([A-Za-z0-9\s]*)$/;

const looksLikeName = (line) => {
  if (!line || line.length < 3) return false;
  if (/^[●※▲◆■【（(]/.test(line)) return false;
  if (NOISE_WORD_RE.test(line)) return false;
  if (PRICE_RE.test(line)) return false;
  if (!HAS_JA_RE.test(line)) return false;
  if (COLOR_ONLY_RE.test(line.trim())) return false;
  if (/^TAIS/i.test(line)) return false;
  return true;
};
const cleanName = (line) => line
  .replace(/^[\d\s]+/, '').replace(/\s*NEW\s*$/i, '')
  .replace(/([ぁ-んァ-ヶ一-龠ー])\s+(?=[ぁ-んァ-ヶ一-龠ー])/g, '$1') // 日本語間の不要な空白を除去
  .trim().slice(0, 60);

// 同一行から型番・価格・TAIS・単位数を取り除いて商品名候補を得る
const stripNoise = (line) => line
  .replace(TAIS_RE, ' ')
  .replace(/TAIS[\/:：]?/ig, ' ')
  .replace(UNITS_RE, ' ')
  .replace(/[￥¥]?\d{1,3}(?:,\d{3})+/g, ' ')
  .replace(/[A-Za-z0-9][A-Za-z0-9\-]{2,}/g, ' ')
  .replace(/\s+/g, ' ').trim();

// ===== レンタル単位数報告書（表形式）専用パーサ =====
// 実物様式は「1商品 = 3行ブロック」:
//   [種目行] 予防手すり貸与                     01265-000055
//   [商品行] たよレールN 2型 │納品│1│2,260│半月│1,130│11│113│31│226│
//   [日付行] 2026年07月21日　～
// 列見出しは … 区分│料金│日数│単位数│日数│単位数 で、
// 手前の単位数は日割り、**最後の単位数が月額**（226/400）。
// 区分（状態）の語。長い語を先に並べる（解約済→解約、引き取り→引取 の順で判定するため）
const KUBUN_RE = /(納品|引き取り|引取|解約済|解約|一時中止|中止|中断|休止|再開|返却|撤去|継続|変更|交換|再貸与|開始|終了)/;

// 種目名 → 標準品目名＋区分（「予防手すり貸与」→ 手すり／介護予防福祉用具貸与）
function normalizeItemLabel(label) {
  let s = String(label || '').replace(/[\s　]/g, '');
  if (!s) return null;
  const isPrev = /^(介護予防|予防)/.test(s);
  const isSale = /(販売|購入)/.test(s);
  s = s.replace(/^(介護予防|予防)/, '').replace(/(貸与|販売|購入)$/, '');
  const pool = isSale ? [...SPECIFIC_ITEMS, ...SELECTABLE_ITEMS] : RENTAL_ITEMS;
  const hit = pool.find(it => it === s) || pool.find(it => it.startsWith(s) || s.startsWith(it));
  return {
    item: hit || s,
    category: isSale ? CATEGORY_SPECIFIC : (isPrev ? CATEGORY_PREVENTION : CATEGORY_RENTAL),
  };
}

// ===== Excel(.xlsx) / CSV の読み取り =====
// xlsxはZIP+XML。SheetJS(約1MB)は重いので、解凍(fflate)＋DOMParserで必要最小限だけ読む。
const colToIndex = (ref) => {
  const m = String(ref || '').match(/^([A-Z]+)/);
  if (!m) return 0;
  let n = 0;
  for (const ch of m[1]) n = n * 26 + (ch.charCodeAt(0) - 64);
  return n - 1;
};

function xlsxToRows(arrayBuffer) {
  const files = unzipSync(new Uint8Array(arrayBuffer));
  const parse = (xml) => new DOMParser().parseFromString(xml, 'application/xml');
  // 共有文字列
  const shared = [];
  if (files['xl/sharedStrings.xml']) {
    const doc = parse(strFromU8(files['xl/sharedStrings.xml']));
    for (const si of doc.getElementsByTagName('si')) {
      // <si>直下の<t>を連結（書式分割されている場合がある）
      shared.push([...si.getElementsByTagName('t')].map(t => t.textContent).join(''));
    }
  }
  // 最初のワークシート
  const sheetName = Object.keys(files).find(n => /^xl\/worksheets\/sheet\d+\.xml$/.test(n));
  if (!sheetName) return [];
  const doc = parse(strFromU8(files[sheetName]));
  const rows = [];
  for (const row of doc.getElementsByTagName('row')) {
    const cells = [];
    for (const c of row.getElementsByTagName('c')) {
      const idx = colToIndex(c.getAttribute('r'));
      const type = c.getAttribute('t');
      let val = '';
      if (type === 'inlineStr') {
        val = [...c.getElementsByTagName('t')].map(t => t.textContent).join('');
      } else {
        const v = c.getElementsByTagName('v')[0];
        const raw = v ? v.textContent : '';
        val = type === 's' ? (shared[Number(raw)] ?? '') : raw;
      }
      cells[idx] = String(val ?? '').trim();
    }
    rows.push(Array.from(cells, x => x || ''));
  }
  return rows;
}

// CSV（カンマ／タブ、ダブルクォート対応）
function csvToRows(text) {
  const sep = (text.split('\n')[0] || '').includes('\t') ? '\t' : ',';
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === sep) { row.push(cell.trim()); cell = ''; }
    else if (ch === '\n') { row.push(cell.trim()); rows.push(row); row = []; cell = ''; }
    else if (ch !== '\r') cell += ch;
  }
  if (cell || row.length) { row.push(cell.trim()); rows.push(row); }
  return rows;
}

// 表形式の行データ（Excel/CSV）→ 商品候補。PDFと同じ判定ロジックを流用する。
function parseRowsAsUnitReport(rows) {
  const cands = [];
  const seen = new Set();
  for (const cells of rows) {
    const line = cells.filter(Boolean).join(' ').replace(/\s+/g, ' ').trim();
    if (!line) continue;
    const tm = line.match(TAIS_RE);
    if (!tm) continue;
    const tais = `${tm[1]}-${tm[2]}`;

    // 種目名（○○貸与/販売）を含むセルから品目・区分を決める
    let norm = null;
    for (const c of cells) {
      if (c && /(貸与|販売|購入)$/.test(c.replace(/[\s　]/g, ''))) { norm = normalizeItemLabel(c); break; }
    }
    // 商品名: TAIS・数値・区分・種目名以外で最も長い日本語セル
    const nameCell = cells
      .filter(c => c && !TAIS_RE.test(c) && !NUM_LIKE_RE.test(c) && !KUBUN_RE.test(c)
        && !/(貸与|販売|購入)$/.test(c.replace(/[\s　]/g, '')) && HAS_JA_RE.test(c))
      .sort((a, b) => b.length - a.length)[0] || '';
    const productName = cleanName(nameCell);
    if (!productName) continue;

    // 単位数: 「単位」列の値、なければ行の最後の数値（月額）
    const nums = cells.filter(c => NUM_LIKE_RE.test(c)).map(toInt).filter(n => n > 0);
    const um = line.match(UNITS_RE);
    const units = um ? toInt(um[1]) : (nums.length ? nums[nums.length - 1] : 0);
    const km = line.match(KUBUN_RE);
    const kubun = (km ? km[1] : '').replace('引き取り', '引取').replace('解約済', '解約');

    const key = `${productName}|${tais}|${units}`;
    if (seen.has(key)) continue;
    seen.add(key);
    cands.push({
      productName: productName.slice(0, 60), maker: '', tais, units,
      item: norm ? norm.item : '', category: norm ? norm.category : CATEGORY_RENTAL, kubun,
    });
  }
  return cands;
}

// 表データからヘッダー情報を抽出（PDF版と同じラベル規則を1行テキストに適用）
function parseHeaderFromRows(rows) {
  const spans = [];
  rows.forEach((cells, ri) => {
    cells.forEach((c, ci) => { if (c) spans.push({ text: c, page: 1, x: ci * 10, y: -ri * 10 }); });
  });
  return parseReportHeader(spans);
}

// ===== 単位数報告書のヘッダー情報（利用者名・居宅・ケアマネ・担当）を抽出 =====
// 「ラベル：値」「ラベル 値」どちらの書式でも拾えるようにする。
// ラベルは長いものから並べる（「居宅」が「居宅介護支援事業所」より先にマッチすると
// 残りの「介護支援事業所」を値として拾ってしまうため）
const HEADER_PATTERNS = [
  { key: 'clientName', re: /(?:ご利用者名|ご利用者|被保険者名|被保険者|利用者名|利用者)\s*[:：]?\s*([^\s:：]{2,20})/ },
  { key: 'cmOffice',   re: /(?:居宅介護支援事業所|居宅介護支援事業者|居宅事業所|支援事業所|事業所名|居宅)\s*[:：]?\s*([^\s:：]{2,30})/ },
  { key: 'careManager',re: /(?:担当ケアマネジャー|担当ケアマネージャー|ケアマネジャー|ケアマネージャー|介護支援専門員|担当ケアマネ|ケアマネ)\s*[:：]?\s*([^\s:：]{2,20})/ },
  { key: 'staff',      re: /(?:弊社担当者|弊社担当|自社担当|担当営業|営業担当)\s*[:：]?\s*([^\s:：]{2,20})/ },
];
// 値として不適切な語（ラベルの続きを誤って拾わないため）
const BAD_HEADER_VALUE = /^(様|名|殿|欄|印|氏名|なし|無し|以下|上記|該当)$/;

// テキストが「ラベルだけ」かを判定（セル/span単位）
const headerLabelOf = (t) => {
  const s = String(t || '').replace(/[\s　:：]/g, '');
  if (/^(ご利用者名|ご利用者|被保険者名|被保険者|利用者名|利用者)$/.test(s)) return 'clientName';
  if (/^(居宅介護支援事業所|居宅介護支援事業者|居宅事業所|支援事業所|事業所名|居宅)$/.test(s)) return 'cmOffice';
  if (/^(担当ケアマネジャー|担当ケアマネージャー|ケアマネジャー|ケアマネージャー|介護支援専門員|担当ケアマネ|ケアマネ)$/.test(s)) return 'careManager';
  if (/^(弊社担当者|弊社担当|自社担当|担当営業|営業担当)$/.test(s)) return 'staff';
  return null;
};

function parseReportHeader(spans) {
  const found = {};
  // 先に「ラベルだけのセル → 隣（右 or 次）の値」を拾う。
  // 正規表現を先に走らせると、"居宅介護支援事業所" が短い "居宅" にマッチして
  // 残りの "介護支援事業所" を値と誤認するため、この順序が重要。
  spans.forEach((sp, i) => {
    const key = headerLabelOf(sp.text);
    if (!key || found[key]) return;
    const cand = spans
      .filter(o => o !== sp && o.page === sp.page && Math.abs(o.y - sp.y) <= 4 && o.x > sp.x)
      .sort((a, b) => a.x - b.x)[0] || spans[i + 1];
    if (!cand) return;
    const v = cand.text.replace(/^[:：\s　]+/, '').replace(/[様殿]\s*$/, '').trim();
    if (v && !BAD_HEADER_VALUE.test(v) && !headerLabelOf(cand.text)) found[key] = v.slice(0, 30);
  });
  // 次に「ラベル：値」が1つのテキストに収まっているケース
  for (const sp of spans) {
    if (headerLabelOf(sp.text)) continue; // ラベル単独は上で処理済み
    for (const p of HEADER_PATTERNS) {
      if (found[p.key]) continue;
      const m = sp.text.match(p.re);
      if (!m) continue;
      const v = m[1].replace(/[様殿]\s*$/, '').trim();
      if (v && !BAD_HEADER_VALUE.test(v) && !headerLabelOf(v)) found[p.key] = v.slice(0, 30);
    }
  }
  return found;
}

function parseRentalUnitReport(spans) {
  // 同一y座標＝同一視覚行としてまとめ、ページ順・上から下へ並べる
  const rowMap = new Map();
  for (const sp of spans) {
    const key = sp.page + ':' + sp.y;
    if (!rowMap.has(key)) rowMap.set(key, { page: sp.page, y: sp.y, items: [] });
    rowMap.get(key).items.push(sp);
  }
  const rows = [...rowMap.values()]
    .map(r => ({ page: r.page, y: r.y, items: r.items.slice().sort((a, b) => a.x - b.x) }))
    .sort((a, b) => a.page - b.page || b.y - a.y);

  const cands = [];
  for (let i = 0; i < rows.length; i++) {
    const texts = rows[i].items.map(s => s.text);
    const tm = texts.join(' ').match(TAIS_RE);
    if (!tm) continue;
    // 種目行の判定: TAISを除いた文字列に「○○貸与/販売」があること
    const label = texts.map(t => t.replace(TAIS_RE, '')).join('').replace(/[\s　]/g, '').trim();
    if (!/(貸与|販売|購入)/.test(label)) continue;
    const norm = normalizeItemLabel(label);
    if (!norm) continue;

    // 直下の行を商品行とみなす（同一ページ・行間が離れすぎていないこと）
    const next = rows[i + 1];
    if (!next || next.page !== rows[i].page || (rows[i].y - next.y) > 40) continue;

    // 商品行は「商品名＋数値列」。PDFによっては列が1つのテキストとして繋がって
    // 取得されるため、span単位ではなく**文字列**として切り分ける。
    const rowText = next.items.map(i => i.text).join(' ').replace(/\s+/g, ' ').trim();

    // 区分（納品/引取…）の位置で切る。区分が無ければ「独立した数値」の位置で切る
    // （「2型」のように数字が商品名に含まれる場合を誤検出しないよう、前後が区切りの数値のみ対象）
    let cut = -1;
    const km = rowText.match(KUBUN_RE);
    if (km) cut = km.index;
    if (cut < 0) {
      const nm = rowText.match(/(?:^|\s)\d[\d,]*(?=\s|$)/);
      if (nm) cut = nm.index;
    }
    const productName = (cut >= 0 ? rowText.slice(0, cut) : rowText).trim();
    if (!productName) continue;

    const dataText = cut >= 0 ? rowText.slice(cut) : '';
    const nums = dataText.match(/\d[\d,]*/g) || [];
    const units = nums.length ? toInt(nums[nums.length - 1]) : 0; // 最後の数値＝月額単位数
    const kubun = (km ? km[1] : '').replace('引き取り', '引取').replace('解約済', '解約');

    cands.push({
      productName: productName.slice(0, 60),
      maker: '',                       // メーカー名は取得しない（不要との運用方針）
      tais: `${tm[1]}-${tm[2]}`,
      units,
      item: norm.item,
      category: norm.category,
      kubun,
    });
  }
  return cands;
}

// TAISコード・単位数の出現位置から、空間的（同ページ・同カラム・近傍）に
// 商品名を探索して候補を組み立てる。表形式の単位数報告書は同一行から直接取れる。
function parseCandidatesFromLines(spans) {
  const cands = [];
  const seen = new Set();
  const pushCand = (c) => {
    const key = `${c.productName}|${c.tais}|${c.units}`;
    if (c.productName && !seen.has(key)) { seen.add(key); cands.push(c); }
  };
  spans.forEach((sp) => {
    const tm = sp.text.match(TAIS_RE);
    const um = sp.text.match(UNITS_RE);
    if (!tm && !um) return;
    const tais = tm ? `${tm[1]}-${tm[2]}` : '';
    let units = um ? toInt(um[1]) : 0;
    let name = '';
    // 1) 同一行に商品名が含まれるケース（表形式の単位数報告書）
    const stripped = stripNoise(sp.text);
    if (HAS_JA_RE.test(stripped) && !NOISE_WORD_RE.test(stripped)) name = cleanName(stripped);
    // 2) カタログの商品見出し「0 商品名」を空間探索（同カラム・上方向を優先）
    if (!name) {
      let best = null;
      for (const cand of spans) {
        if (cand.page !== sp.page) continue;
        const m0 = cand.text.match(/^0\s+(.+)$/);
        if (!m0 || !HAS_JA_RE.test(m0[1]) || PRICE_RE.test(m0[1])) continue;
        const dx = Math.abs(cand.x - sp.x);
        const dy = cand.y - sp.y; // 正 = 見出しがTAISより上（カード内の通常配置）
        if (dx > 160 || dy < -50 || dy > 300) continue;
        const score = (dy >= 0 ? dy : 400 + Math.abs(dy)) + dx * 0.6;
        if (!best || score < best.score) best = { score, name: cleanName(m0[1]) };
      }
      if (best) name = best.name;
    }
    // 3) それでも無ければ名前らしい行を空間探索
    if (!name) {
      let best = null;
      for (const cand of spans) {
        if (cand.page !== sp.page) continue;
        if (!looksLikeName(cand.text)) continue;
        const dx = Math.abs(cand.x - sp.x);
        const dy = cand.y - sp.y;
        if (dx > 160 || dy < -40 || dy > 260) continue;
        const score = Math.abs(dy) + dx * 0.6;
        if (!best || score < best.score) best = { score, name: cleanName(cand.text) };
      }
      if (best) name = best.name;
    }
    // 単位数は同カラムのすぐ近くから
    if (!units) {
      for (const cand of spans) {
        if (cand.page !== sp.page) continue;
        const m2 = cand.text.match(UNITS_RE);
        if (!m2) continue;
        if (Math.abs(cand.x - sp.x) < 160 && Math.abs(cand.y - sp.y) < 70) { units = toInt(m2[1]); break; }
      }
    }
    pushCand({ productName: name, tais, units });
  });
  return cands;
}

// スキャンPDF用: ページを画像化（AI読み取りに渡す）
async function renderPdfPagesToImages(doc, maxPages = 3, scale = 1.6) {
  const images = [];
  const n = Math.min(doc.numPages, maxPages);
  for (let p = 1; p <= n; p++) {
    const page = await doc.getPage(p);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    images.push(canvas.toDataURL('image/jpeg', 0.85));
  }
  return images;
}

async function aiRecognizePhoto(apiKey, model, dataUrl) {
  const client = aiClient(apiKey);
  const b64 = dataUrl.split(',')[1];
  const res = await client.messages.create({
    model,
    max_tokens: 1024,
    messages: [{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
        { type: 'text', text: PHOTO_PROMPT },
      ],
    }],
    output_config: { format: { type: 'json_schema', schema: PHOTO_SCHEMA } },
  });
  if (res.stop_reason === 'refusal') throw new Error('AIが認識を拒否しました');
  const text = (res.content.find(b => b.type === 'text') || {}).text || '{}';
  return JSON.parse(text);
}

async function aiExtractFromDocImages(apiKey, model, dataUrls, onProgress) {
  const client = aiClient(apiKey);
  const all = [];
  for (let i = 0; i < dataUrls.length; i++) {
    if (onProgress) onProgress(`AI読み取り中… ${i + 1}/${dataUrls.length}ページ`);
    const b64 = dataUrls[i].split(',')[1];
    const res = await client.messages.create({
      model,
      max_tokens: 4096,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
          { type: 'text', text: 'これは福祉用具のレンタル単位数報告書（または商品一覧）です。記載されている商品ごとに、商品名・メーカー・TAISコード・単位数を抽出してください。読み取れない値は空文字/0にしてください。' },
        ],
      }],
      output_config: { format: { type: 'json_schema', schema: DOC_SCHEMA } },
    });
    if (res.stop_reason === 'refusal') continue;
    const text = (res.content.find(b => b.type === 'text') || {}).text || '{}';
    try {
      const parsed = JSON.parse(text);
      if (Array.isArray(parsed.products)) all.push(...parsed.products);
    } catch {}
  }
  return all;
}

// ===== 商品マスタ（使うほど賢くなる学習辞書） =====
// マスタには「商品名」だけを覚える。種目名・区分・会社名・数値列などの
// ゴミ（過去のPDF解析の残骸を含む）は登録しない。
const ALL_ITEM_LABELS = [...RENTAL_ITEMS, ...SPECIFIC_ITEMS, ...SELECTABLE_ITEMS];
function isJunkMasterName(name) {
  const n = String(name || '').trim();
  if (n.length < 2) return true;
  if (/^[〜～]/.test(n)) return true;                                   // 「〜 レンタル終了日」
  if (/レンタル(開始|終了)|納品|引取|引き取り|解約|継続|中止|中断|休止|返却|撤去|再貸与/.test(n)) return true; // 区分・状態語
  if (/(貸与|販売|購入)$/.test(n.replace(/[\s　]/g, ''))) return true;   // 「予防歩行器貸与」等の種目行
  if (/太陽シルバーサービス|株式会社|営業所/.test(n)) return true;       // 会社・営業所名
  if (/\d[\d,]*\s+(半月|月額)|(半月|月額)\s+\d/.test(n)) return true;    // 数値列（料金・単位数）
  if ((n.match(/\d[\d,]{2,}/g) || []).length >= 2) return true;         // 数値の羅列
  if (ALL_ITEM_LABELS.includes(n.replace(/[\s　]/g, ''))) return true;   // 種目名そのもの（手すり等）
  return false;
}

// 既存マスタからゴミを除去（重複も統合）。戻り値 {list, removed}
function cleanMaster(master) {
  const seen = new Map();
  let removed = 0;
  for (const m of master) {
    if (!m || isJunkMasterName(m.name)) { removed++; continue; }
    const name = m.name.trim();
    const cur = seen.get(name);
    if (!cur || (m.updatedAt || 0) > (cur.updatedAt || 0)) seen.set(name, { ...m, name });
  }
  return { list: [...seen.values()], removed };
}

function upsertMaster(master, sets) {
  const next = [...master];
  for (const s of sets) {
    const name = (s.productName || '').trim();
    if (!name || isJunkMasterName(name)) continue; // 商品名以外は覚えない
    const idx = next.findIndex(m => m.name === name);
    const entry = {
      name,
      tais: s.tais || '',
      category: s.category || '',
      item: s.item || '',
      units: toInt(s.units),
      updatedAt: Date.now(),
    };
    if (idx >= 0) {
      // 空欄は既存値を残す
      const old = next[idx];
      next[idx] = {
        ...entry,
        tais: entry.tais || old.tais,
        category: entry.category || old.category,
        item: entry.item || old.item,
        units: entry.units || old.units,
      };
    } else {
      next.push(entry);
    }
  }
  return next;
}

// 数値欄の意味は区分で異なる: 貸与=レンタル単位数、特定福祉用具(販売)=価格(円)
const reportSummary = (report) => {
  const rental = report.sets.filter(s => RENTAL_CATEGORIES.includes(s.category)).length;
  const specific = report.sets.filter(s => s.category === CATEGORY_SPECIFIC).length;
  const amt = (s) => toInt(s.units) * Math.max(1, toInt(s.qty) || 1);
  const units = report.sets.filter(s => RENTAL_CATEGORIES.includes(s.category)).reduce((sum, s) => sum + amt(s), 0);
  const sales = report.sets.filter(s => s.category === CATEGORY_SPECIFIC).reduce((sum, s) => sum + amt(s), 0);
  return { rental, specific, units, sales };
};

    const photo = (typeof rawPhoto === 'string' && /^data:image\//.test(rawPhoto)) ? rawPhoto : null;

      : s.category === CATEGORY_PREVENTION ? '予防貸与'

  // 報告事項の行数を見積もり、1ページ目に載せるカード行数を動的に決める

// ===== 明細カード =====
// React.memo: 利用者名や報告事項の入力中に全カード（写真img込み）が
// 再レンダーされるのを防ぐ。propsのコールバックは親側で参照安定化済み。
const SetCard = React.memo(function SetCard({ s, idx, photo, onUpdate, onRemove, onRecognize, onAttach, onMasterMatch, onDropFiles }) {
  const isSale = s.category === CATEGORY_SPECIFIC; // 販売品は単位数ではなく価格(円)
  const [over, setOver] = useState(false);
  // このカードに直接ドロップされた写真は、このカードに添付する
  const dropProps = {
    onDragOver: (e) => { e.preventDefault(); e.stopPropagation(); setOver(true); },
    onDragLeave: (e) => { e.stopPropagation(); setOver(false); },
    onDrop: (e) => {
      e.preventDefault(); e.stopPropagation(); setOver(false);
      if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) onDropFiles(e.dataTransfer.files, s.id);
    },
  };
  return (
    <div className="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
      <div className="flex items-center gap-2 px-3 py-2 bg-slate-50 border-b border-slate-200">
        <span className="w-6 h-6 rounded bg-blue-600 text-white text-xs font-bold flex items-center justify-center shrink-0">{idx + 1}</span>
        <select className="h-8 px-1.5 border border-slate-300 rounded text-xs bg-white font-bold"
          value={s.category} onChange={e => onUpdate(s.id, { category: e.target.value, item: '' })}>
          {CATEGORIES.map(c => <option key={c} value={c}>{CATEGORY_SHORT[c] || c}</option>)}
        </select>
        <select className="h-8 px-1.5 border border-slate-300 rounded text-xs bg-white flex-1 min-w-0"
          value={s.item} onChange={e => onUpdate(s.id, { item: e.target.value })}>
          <option value="">品目を選択…</option>
          {/* PDF取込で標準種目に一致しなかった値も保持して表示する */}
          {s.item && ![...RENTAL_ITEMS, ...SPECIFIC_ITEMS, ...SELECTABLE_ITEMS].includes(s.item) && (
            <option value={s.item}>{s.item}</option>
          )}
          {isSale ? (
            <>
              <optgroup label="特定福祉用具販売">
                {SPECIFIC_ITEMS.map(it => <option key={it} value={it}>{it}</option>)}
              </optgroup>
              <optgroup label="貸与・販売選択制（2024年度〜）">
                {SELECTABLE_ITEMS.map(it => <option key={it} value={it}>{it}</option>)}
              </optgroup>
            </>
          ) : RENTAL_ITEMS.map(it => <option key={it} value={it}>{it}</option>)}
        </select>
        <button className="text-slate-400 hover:text-rose-600 shrink-0 p-2" title="明細を削除" onClick={() => onRemove(s)}><Trash2 size={16} /></button>
      </div>

      <div className="flex gap-2.5 p-2.5">
        <div className={`w-28 shrink-0 rounded-md ${over ? 'ring-2 ring-emerald-500' : ''}`} {...dropProps}>
          {s.photoId && photo ? (
            <div className="relative">
              <img src={photo} alt="" className="w-28 h-28 object-cover rounded-md border border-slate-200" />
              <button
                className="absolute top-1 right-1 bg-slate-900/70 text-white rounded-md p-1.5"
                title="写真を外す"
                onClick={() => onUpdate(s.id, { photoId: null })}>
                <X size={14} />
              </button>
            </div>
          ) : (
            <button
              className={`w-28 h-28 border-2 border-dashed rounded-md flex flex-col items-center justify-center text-[10px] gap-1 transition
                ${over ? 'border-emerald-500 text-emerald-600 bg-emerald-50' : 'border-slate-300 text-slate-400 hover:border-blue-400 hover:text-blue-500'}`}
              onClick={() => onAttach(s.id)}>
              <ImagePlus size={20} /> {over ? 'ここに追加' : '写真を添付'}
              <span className="text-[9px] text-slate-400">ドロップ可</span>
            </button>
          )}
          {AI_ENABLED && s.photoId && (
            <button className="mt-1.5 w-full text-[11px] font-bold text-purple-700 bg-purple-50 border border-purple-200 rounded px-1 py-1.5 flex items-center justify-center gap-1 hover:bg-purple-100"
              onClick={() => onRecognize(s)}>
              <Sparkles size={12} /> AI認識
            </button>
          )}
        </div>

        <div className="flex-1 min-w-0 space-y-1.5">
          <div>
            <input className={inputCls} list="master-list" value={s.productName} placeholder="商品名（入力するとマスタから補完）"
              onChange={e => onUpdate(s.id, { productName: e.target.value })}
              onBlur={e => e.target.value && onMasterMatch(s.id, e.target.value)} />
          </div>
          <select className={inputCls} value={s.place}
            onChange={e => onUpdate(s.id, { place: e.target.value })}>
            <option value="">納品箇所…</option>
            {PLACES.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-1.5">
            <input className={`${inputCls} col-span-2 md:col-span-1 tabular-nums`} inputMode="numeric" value={s.tais} placeholder="TAISコード"
              onChange={e => onUpdate(s.id, { tais: e.target.value })}
              onBlur={e => onUpdate(s.id, { tais: normalizeTais(e.target.value) })} />
            <div className="flex items-center gap-1">
              <input className={`${inputCls} text-right tabular-nums`} inputMode="numeric" value={s.units}
                placeholder={isSale ? '価格' : '単位数'}
                onChange={e => onUpdate(s.id, { units: e.target.value.replace(/[^\d]/g, '') })} />
              <span className="text-[10px] text-slate-400 shrink-0">{isSale ? '円' : '単位'}</span>
            </div>
            <div className="flex items-center gap-1">
              <span className="text-[10px] text-slate-400 shrink-0">数量</span>
              <input className={`${inputCls} text-right tabular-nums`} inputMode="numeric" value={s.qty}
                onChange={e => onUpdate(s.id, { qty: e.target.value.replace(/[^\d]/g, '') })} />
            </div>
          </div>
          <input className={inputCls} value={s.note} maxLength={40} placeholder="メモ（帳票に印字・40字まで）"
            onChange={e => onUpdate(s.id, { note: e.target.value })} />
        </div>
      </div>
    </div>
  );
});

// ===== メインアプリ =====
function App() {
  const [view, setView] = useState('list');
  const [reports, setReports] = useState(() => loadStorage(STORAGE_KEYS.REPORTS, []));
  const [settings, setSettings] = useState(() => {
    const s = { office: '', staff: '', apiKey: '', aiModel: 'claude-opus-4-8', ...loadStorage(STORAGE_KEYS.SETTINGS, {}) };
    if (!AI_ENABLED) s.apiKey = ''; // AI機能OFF時は保管済みキーを残さない
    return s;
  });
  // 起動時に商品マスタのゴミ（過去のPDF解析の残骸等）を静かに整理して読み込む
  const [master, setMaster] = useState(() => cleanMaster(loadStorage(STORAGE_KEYS.MASTER, [])).list);
  const [masterPick, setMasterPick] = useState(null); // マスタから選ぶダイアログの選択状態
  const [masterOpen, setMasterOpen] = useState(false); // メイン画面の商品マスタ開閉
  const [drafts, setDrafts] = useState(() => loadStorage(STORAGE_KEYS.DRAFTS, {}));
  const [report, setReport] = useState(null);
  const [photoCache, setPhotoCache] = useState({});
  const [busy, setBusy] = useState(null);
  const [toast, setToast] = useState(null);
  const [printOpen, setPrintOpen] = useState(false);
  const [dropOver, setDropOver] = useState(false); // 編集画面全体への写真ドロップ
  const dragDepth = useRef(0);
  const [pdfCands, setPdfCands] = useState(null); // {source, items:[{productName,maker,tais,units,checked}]}
  const [pendingDoc, setPendingDoc] = useState(null); // スキャンPDFのAI読み取り待ち
  const toastTimer = useRef(null);
  const draftTimer = useRef(null);
  const handleFilesRef = useRef(null); // ドロップ経路から最新のhandleFilesを呼ぶため
  const openSnapshotRef = useRef(null); // 開いた時点のJSON（一致する間はドラフト化しない）
  const prevViewRef = useRef('list');   // 設定画面から戻る先
  const fileInputRef = useRef(null);
  const cameraInputRef = useRef(null);
  const pdfInputRef = useRef(null);
  const importInputRef = useRef(null);
  const attachTargetRef = useRef(null); // 写真をどのカードに付けるか（null=新規カード）

  const showToast = useCallback((msg, type = 'ok') => {
    clearTimeout(toastTimer.current);
    setToast({ msg, type });
    toastTimer.current = setTimeout(() => setToast(null), type === 'error' ? 5000 : 2600);
  }, []);

  // 永続化
  useEffect(() => { saveStorage(STORAGE_KEYS.REPORTS, reports); }, [reports]);
  useEffect(() => { saveStorage(STORAGE_KEYS.SETTINGS, settings); }, [settings]);
  useEffect(() => { saveStorage(STORAGE_KEYS.MASTER, master); }, [master]);
  useEffect(() => { saveStorage(STORAGE_KEYS.DRAFTS, drafts); }, [drafts]);

  // 編集中ドラフトの自動保存（800msデバウンス・報告書ID別・未編集ならドラフト化しない）
  useEffect(() => {
    if (!report) return;
    clearTimeout(draftTimer.current);
    draftTimer.current = setTimeout(() => {
      if (JSON.stringify(report) === openSnapshotRef.current) return;
      setDrafts(d => ({ ...d, [report.id]: report }));
    }, 800);
    return () => clearTimeout(draftTimer.current);
  }, [report]);

  // 孤児写真のGC（起動時1回）。stateのクロージャは使わず localStorage を直接読む
  // （起動直後の保存・インポートで増えた写真を誤削除しないため）
  useEffect(() => {
    const t = setTimeout(async () => {
      try {
        const referenced = new Set();
        const collect = (r) => r && Array.isArray(r.sets) && r.sets.forEach(s => s && s.photoId && referenced.add(s.photoId));
        loadStorage(STORAGE_KEYS.REPORTS, []).forEach(collect);
        Object.values(loadStorage(STORAGE_KEYS.DRAFTS, {})).forEach(collect);
        const keys = await idbKeys();
        for (const k of keys) if (!referenced.has(k)) await idbDel(k);
      } catch {}
    }, 6000);
    return () => clearTimeout(t);
  }, []);

  // 一覧に戻ったら写真のメモリキャッシュを解放（報告書を渡り歩いた際の肥大化防止）
  useEffect(() => { if (view === 'list') setPhotoCache({}); }, [view]);

  // マスタは種目別にグループ化（商品名だけの一覧を項目ごとにまとめる）
  const masterGroups = useMemo(() => {
    const g = {};
    for (const m of master) {
      const key = m.item || 'その他';
      (g[key] = g[key] || []).push(m);
    }
    const order = [...RENTAL_ITEMS, ...SPECIFIC_ITEMS, ...SELECTABLE_ITEMS, 'その他'];
    return Object.keys(g)
      .sort((a, b) => (order.indexOf(a) + 1 || 999) - (order.indexOf(b) + 1 || 999))
      .map(k => ({ item: k, items: g[k].slice().sort((a, b) => a.name.localeCompare(b.name, 'ja')) }));
  }, [master]);

  // ---- 写真キャッシュ（IndexedDB → メモリ） ----
  const ensurePhotos = useCallback(async (ids) => {
    const map = {};
    const add = {};
    for (const id of ids) {
      if (!id) continue;
      const v = photoCache[id] || await idbGet(id);
      if (v) { map[id] = v; if (!photoCache[id]) add[id] = v; }
    }
    // 関数型更新: await中の並行更新（写真追加等）を巻き戻さない
    if (Object.keys(add).length) setPhotoCache(c => ({ ...c, ...add }));
    return map;
  }, [photoCache]);

  useEffect(() => {
    if (report) ensurePhotos(report.sets.map(s => s.photoId).filter(Boolean));
  }, [report && report.sets.map(s => s.photoId).join(',')]);

  // ---- 報告書操作 ----
  const openNew = () => {
    const r = emptyReport(settings);
    openSnapshotRef.current = JSON.stringify(r);
    setReport(r); setView('edit');
  };
  const openReport = (r) => {
    const src = drafts[r.id] || r; // 同じ報告書の未保存下書きがあれば優先して開く
    const copy = JSON.parse(JSON.stringify(src));
    openSnapshotRef.current = drafts[r.id] ? null : JSON.stringify(copy);
    setReport(copy); setView('edit');
  };
  const resumeDraft = (d) => {
    openSnapshotRef.current = null; // 下書きは常に未保存扱い
    setReport(JSON.parse(JSON.stringify(d))); setView('edit');
  };
  const discardDraft = (d) => {
    if (!confirm(`「${d.clientName || '無題'} 様邸」の下書きを破棄しますか？`)) return;
    setDrafts(ds => { const n = { ...ds }; delete n[d.id]; return n; });
  };

  const updateReport = (patch) => setReport(r => ({ ...r, ...patch, updatedAt: Date.now() }));
  // SetCard(React.memo)へ渡すため参照を安定化
  const updateSet = useCallback((setId, patch) =>
    setReport(r => ({ ...r, updatedAt: Date.now(), sets: r.sets.map(s => s.id === setId ? { ...s, ...patch } : s) })), []);

  // 商品名からマスタ照合 → 空欄を自動補完
  const applyMasterMatch = (setId, name) => {
    const hit = master.find(m => m.name === name.trim());
    if (!hit) return;
    setReport(r => ({
      ...r, updatedAt: Date.now(),
      sets: r.sets.map(s => {
        if (s.id !== setId) return s;
        return {
          ...s,
          tais: s.tais || hit.tais,
          maker: s.maker || hit.maker,
          // 区分はユーザーが品目を選ぶ前のみマスタ値で補完（選択済みの区分を無断で上書きしない）
          category: (!s.item && hit.category) ? hit.category : s.category,
          item: s.item || hit.item,
          units: toInt(s.units) ? s.units : (hit.units ? String(hit.units) : s.units),
        };
      }),
    }));
    showToast(`マスタから補完しました：${hit.name}`);
  };

  // 写真実体は消さない（保存前の編集は取り消せる必要がある）。実体回収は起動時GCに一本化
  const removeSet = useCallback((s) => {
    if (!confirm('この明細を削除しますか？')) return;
    setReport(r => ({ ...r, updatedAt: Date.now(), sets: r.sets.filter(x => x.id !== s.id) }));
  }, []);

  const saveReport = () => {
    if (!report.clientName.trim()) { showToast('利用者名を入力してください', 'error'); return; }
    if (!report.office) { showToast('営業所を選択してください（帳票の発行元になります）', 'error'); return; }
    const rep = { ...report, deliveryDate: report.deliveryDate || todayISO(), updatedAt: Date.now() };
    clearTimeout(draftTimer.current); // 保存直前のデバウンスで下書きが復活しないように
    setReport(rep);
    setReports(list => {
      const idx = list.findIndex(r => r.id === rep.id);
      const next = [...list];
      if (idx >= 0) next[idx] = rep; else next.unshift(rep);
      return next;
    });
    setMaster(m => upsertMaster(m, rep.sets));
    setDrafts(ds => { const n = { ...ds }; delete n[rep.id]; return n; });
    openSnapshotRef.current = JSON.stringify(rep);
    // 担当者・営業所は次回の新規作成に自動で入るよう記憶（毎回の入力を不要にする）
    if (rep.staff !== settings.staff || rep.office !== settings.office) {
      setSettings(s => ({ ...s, staff: rep.staff || s.staff, office: rep.office || s.office }));
    }
    showToast('保存しました（担当者・営業所は次回から自動入力されます）');
  };

  const deleteReport = (r) => {
    if (!confirm(`「${r.clientName || '無題'} 様邸」の報告書を削除しますか？\n（添付写真は次回起動時に自動整理されます）`)) return;
    setReports(list => list.filter(x => x.id !== r.id));
    setDrafts(ds => { const n = { ...ds }; delete n[r.id]; return n; });
    showToast('削除しました');
  };

  const duplicateReport = (r) => {
    const copy = JSON.parse(JSON.stringify(r));
    copy.id = genId('rp');
    copy.deliveryDate = todayISO();
    copy.updatedAt = Date.now();
    // 写真は複製しない（同じphotoIdを共有すると片方削除で消えるため外す）
    // 報告事項も引き継がない（前回訪問の報告文を書き直さず提出する事故を防ぐ）
    copy.remarks = '';
    copy.sets = copy.sets.map(s => ({ ...s, id: genId('st'), photoId: null }));
    openSnapshotRef.current = null;
    setReport(copy); setView('edit');
    showToast('複製しました（写真と報告事項は引き継ぎません）');
  };

  // ---- 写真添付 ----
  // 写真の取り込み（ファイル選択・カメラ・ドラッグ＆ドロップ共通）
  const handleFiles = async (files, targetSetId) => {
    const list = Array.from(files || []).filter(f => f.type.startsWith('image/'));
    if (!list.length) return;
    try {
      const cacheAdd = {};
      const newSets = [];
      let target = targetSetId;
      let done = 0;
      for (const f of list) {
        setBusy(`写真を取り込み中… ${++done}/${list.length}枚（自動リサイズ）`);
        const dataUrl = await processImageFile(f);
        const photoId = genId('ph');
        await idbPut(photoId, dataUrl);
        cacheAdd[photoId] = dataUrl;
        if (target) {
          const tid = target; target = null; // 2枚目以降は新規カード
          setReport(r => ({ ...r, updatedAt: Date.now(), sets: r.sets.map(s => s.id === tid ? { ...s, photoId } : s) }));
        } else {
          newSets.push({ ...emptySet(), photoId });
        }
      }
      if (newSets.length) setReport(r => ({ ...r, updatedAt: Date.now(), sets: [...r.sets, ...newSets] }));
      setPhotoCache(c => ({ ...c, ...cacheAdd }));
      showToast(`${list.length}枚の写真を取り込みました`);
    } catch (err) {
      showToast(`写真の取り込みに失敗：${err.message}`, 'error');
    } finally { setBusy(null); }
  };

  // ---- AI認識 ----
  const requireApiKey = () => {
    if (!AI_ENABLED) return false; // AI機能OFF時はどの経路からも実行させない
    if (!settings.apiKey) {
      showToast('AI認識を使うには「設定」でAPIキーを入力してください', 'error');
      prevViewRef.current = 'edit';
      setView('settings');
      return false;
    }
    return true;
  };

  const recognizeSet = async (s, silent) => {
    if (!requireApiKey()) return false;
    const photo = photoCache[s.photoId] || await idbGet(s.photoId);
    if (!photo) { if (!silent) showToast('写真がありません', 'error'); return false; }
    try {
      const rec = await aiRecognizePhoto(settings.apiKey, settings.aiModel, photo);
      setReport(r => ({
        ...r, updatedAt: Date.now(),
        sets: r.sets.map(x => {
          if (x.id !== s.id) return x;
          const category = CATEGORIES.includes(rec.category) ? rec.category : x.category;
          return {
            ...x,
            productName: x.productName || rec.productName || '',
            maker: x.maker || rec.maker || '',
            category: x.productName ? x.category : category,
            item: x.item || rec.item || '',
            tais: x.tais || normalizeTais(rec.tais || ''),
            units: toInt(x.units) ? x.units : (rec.units ? String(rec.units) : x.units),
            place: x.place || rec.place || '',
            note: x.note || rec.note || '',
          };
        }),
      }));
      // マスタ照合でTAIS/単位数を追加補完
      if (rec.productName) {
        const hit = master.find(m => m.name === rec.productName.trim());
        if (hit) applyMasterMatch(s.id, rec.productName);
      }
      return true;
    } catch (err) {
      if (!silent) showToast(`AI認識に失敗：${friendlyError(err)}`, 'error');
      return false;
    }
  };

  const recognizeOne = async (s) => {
    if (!requireApiKey()) return;
    setBusy('AIが写真を認識中…');
    const ok = await recognizeSet(s, false);
    setBusy(null);
    if (ok) showToast('AI認識の結果を反映しました（入力済みの欄は上書きしません）');
  };

  const recognizeAll = async () => {
    if (!requireApiKey()) return;
    const targets = report.sets.filter(s => s.photoId && !s.productName);
    if (!targets.length) { showToast('未認識の写真がありません'); return; }
    let done = 0;
    for (const s of targets) {
      setBusy(`AIが写真を認識中… ${done + 1}/${targets.length}枚`);
      if (await recognizeSet(s, true)) done++;
    }
    setBusy(null);
    showToast(`${done}/${targets.length}枚を認識しました`);
  };

  const draftRemarks = async () => {
    if (!requireApiKey()) return;
    setBusy('AIが報告事項の下書きを作成中…');
    try {
      const text = await aiDraftRemarks(settings.apiKey, settings.aiModel, report);
      updateReport({ remarks: report.remarks ? report.remarks + '\n' + text : text });
      showToast('報告事項の下書きを追記しました');
    } catch (err) {
      showToast(`下書き作成に失敗：${friendlyError(err)}`, 'error');
    } finally { setBusy(null); }
  };

  // ---- SetCard(React.memo)へ渡す安定コールバック（最新の実装はrefで参照） ----
  handleFilesRef.current = handleFiles;
  const recognizeOneRef = useRef(null);
  recognizeOneRef.current = recognizeOne;
  const onRecognizeStable = useCallback((s) => { recognizeOneRef.current && recognizeOneRef.current(s); }, []);
  const masterMatchRef = useRef(null);
  masterMatchRef.current = applyMasterMatch;
  const onMasterMatchStable = useCallback((setId, name) => { masterMatchRef.current && masterMatchRef.current(setId, name); }, []);
  const onAttachStable = useCallback((setId) => {
    attachTargetRef.current = setId;
    if (fileInputRef.current) fileInputRef.current.click();
  }, []);
  const onDropFilesStable = useCallback((files, setId) => {
    if (handleFilesRef.current) handleFilesRef.current(files, setId);
  }, []);

  // ---- レンタル単位数報告書（PDF）取込 ----
  // 抽出結果を候補ダイアログに載せ、ヘッダー情報（利用者名等）と全行を報告書へ反映
  const applyExtraction = (cands, header, kind, sourceName) => {
    const delivered = cands.filter(c => c.kubun === '納品').length;
    setPdfCands({
      source: `${sourceName}（${kind}として読み取り）`,
      // 単位数報告書は「納品」のみ既定でON（解約・引取などは一覧に残すがOFF）。
      // カタログは区分の概念が無いので従来どおり全選択。
      items: cands.map(c => ({
        ...c, maker: '',
        checked: kind === '単位数報告書' ? c.kubun === '納品' : true,
      })),
    });
    // 単位数報告書なら、全行と取込元を保存（2枚目の一覧表用）
    if (kind === '単位数報告書') {
      setReport(r => ({
        ...r, updatedAt: Date.now(),
        importSource: sourceName,
        importedRows: cands.map(c => ({
          productName: c.productName, tais: c.tais, units: c.units,
          kubun: c.kubun, item: c.item, category: c.category,
        })),
      }));
    }
    // ヘッダー情報は空欄のみ補完（入力済みは上書きしない）
    const filled = [];
    if (header && Object.keys(header).length) {
      setReport(r => {
        const next = { ...r, updatedAt: Date.now() };
        for (const k of ['clientName', 'cmOffice', 'careManager', 'staff']) {
          if (header[k] && !String(r[k] || '').trim()) { next[k] = header[k]; filled.push(k); }
        }
        return next;
      });
    }
    const labels = { clientName: '利用者名', cmOffice: '居宅', careManager: 'ケアマネ', staff: '担当者' };
    const headMsg = filled.length ? `／${filled.map(k => labels[k]).join('・')}も取り込みました` : '';
    showToast(kind === '単位数報告書'
      ? `${cands.length}件を抽出しました（納品${delivered}件を選択済み）${headMsg}`
      : `${cands.length}件の商品候補を抽出しました。必要な行を選んで追加してください`);
  };

  // PDF / Excel(.xlsx) / CSV を取り込む
  const handleImportFile = async (file) => {
    if (!file) return;
    const name = (file.name || '').toLowerCase();
    const isExcel = /\.(xlsx|xlsm)$/.test(name);
    const isCsv = /\.(csv|txt|tsv)$/.test(name);
    setBusy(isExcel || isCsv ? '表データを解析中…' : 'PDFを解析中…');
    setPendingDoc(null);
    try {
      if (isExcel || isCsv) {
        const rows = isExcel ? xlsxToRows(await file.arrayBuffer()) : csvToRows(await file.text());
        const cands = parseRowsAsUnitReport(rows);
        if (!cands.length) {
          showToast('この表から商品情報（TAISコード）を読み取れませんでした。列の並びをご確認ください', 'error');
          return;
        }
        applyExtraction(cands, parseHeaderFromRows(rows), '単位数報告書', file.name);
        return;
      }
      const buf = await file.arrayBuffer();
      const { spans, doc } = await pdfToLines(buf, setBusy);
      // ① レンタル単位数報告書（表形式）として解釈 → ② 該当なければカタログとして解釈
      let cands = parseRentalUnitReport(spans);
      let kind = '単位数報告書';
      if (!cands.length) { cands = parseCandidatesFromLines(spans); kind = 'カタログ'; }
      if (cands.length) {
        setPendingDoc({ name: file.name, doc }); // 「AIで読み取り直す」用に保持
        applyExtraction(cands, kind === '単位数報告書' ? parseReportHeader(spans) : null, kind, file.name);
      } else {
        // テキストが取れない（スキャンPDF等）→ AI読み取りを提案
        setPendingDoc({ name: file.name, doc });
        showToast(AI_ENABLED
          ? 'テキストを抽出できませんでした。スキャンPDFの場合は「AIで読み取る」をお試しください'
          : 'テキストを抽出できませんでした（画像として保存されたPDFの可能性）。手入力でご登録ください', 'error');
      }
    } catch (err) {
      showToast(`読み取りに失敗：${friendlyError(err)}`, 'error');
    } finally { setBusy(null); }
  };

  const aiReadPendingDoc = async () => {
    if (!pendingDoc || !requireApiKey()) return;
    setBusy('PDFページを画像化中…');
    try {
      const images = await renderPdfPagesToImages(pendingDoc.doc, 3);
      const products = await aiExtractFromDocImages(settings.apiKey, settings.aiModel, images, setBusy);
      if (products.length) {
        setPdfCands({
          source: pendingDoc.name + '（AI読み取り）',
          items: products.map(c => ({
            productName: c.productName || '', maker: c.maker || '',
            tais: normalizeTais(c.tais || ''), units: toInt(c.units), checked: true,
          })).filter(c => c.productName),
        });
        setPendingDoc(null);
        showToast(`AIが${products.length}件を読み取りました`);
      } else {
        showToast('商品情報を読み取れませんでした', 'error');
      }
    } catch (err) {
      showToast(`AI読み取りに失敗：${friendlyError(err)}`, 'error');
    } finally { setBusy(null); }
  };

  // 候補 → 明細へ反映（写真だけのカードに順に割り当て、余りは新規カード）
  const applyCandidates = () => {
    const chosen = pdfCands.items.filter(c => c.checked);
    if (!chosen.length) { showToast('追加する行を選択してください', 'error'); return; }
    setReport(r => {
      const sets = [...r.sets];
      const queue = [...chosen];
      // 1) 商品名が空のカード（写真だけ添付済み）に順に割り当て
      for (let i = 0; i < sets.length && queue.length; i++) {
        if (!sets[i].productName) {
          const c = queue.shift();
          sets[i] = {
            ...sets[i],
            productName: c.productName,
            tais: c.tais || sets[i].tais,
            item: c.item || sets[i].item,
            category: c.category || sets[i].category,
            units: toInt(sets[i].units) ? sets[i].units : (c.units ? String(c.units) : sets[i].units),
          };
        }
      }
      // 2) 余りは新規カード
      for (const c of queue) {
        sets.push({
          ...emptySet(), productName: c.productName, tais: c.tais || '',
          item: c.item || '', category: c.category || CATEGORY_RENTAL,
          units: c.units ? String(c.units) : '',
        });
      }
      return { ...r, updatedAt: Date.now(), sets };
    });
    setMaster(m => upsertMaster(m, chosen.map(c => ({ productName: c.productName, tais: c.tais, item: c.item, category: c.category, units: c.units }))));
    setPdfCands(null);
    setPendingDoc(null); // 反映完了後は「テキストを抽出できませんでした」バナーを出さない
    showToast(`${chosen.length}件を明細に反映しました`);
  };

  // ---- 特定福祉用具を1件追加（単位数報告書に載らないため手動追加用） ----
  const addSpecificItem = () => {
    setReport(r => ({
      ...r, updatedAt: Date.now(),
      sets: [...r.sets, { ...emptySet(), category: CATEGORY_SPECIFIC }],
    }));
    showToast('特定福祉用具の明細を追加しました。品目を選んでください');
  };

  // ---- 商品マスタから選んで報告書へ一括追加 ----
  const openMasterPick = () => {
    if (!master.length) { showToast('商品マスタにまだ商品がありません。保存やPDF取込で貯まります'); return; }
    setMasterPick({}); // {name: true} のチェック状態
  };
  const applyMasterPick = () => {
    const chosen = master.filter(m => masterPick[m.name]);
    if (!chosen.length) { showToast('追加する商品を選択してください', 'error'); return; }
    setReport(r => ({
      ...r, updatedAt: Date.now(),
      sets: [...r.sets, ...chosen.map(m => ({
        ...emptySet(),
        productName: m.name, tais: m.tais || '',
        item: m.item || '', category: m.category || CATEGORY_RENTAL,
        units: m.units ? String(m.units) : '',
      }))],
    }));
    setMasterPick(null);
    showToast(`${chosen.length}件を報告書に追加しました`);
  };

  // ---- 印刷 / PDF ----
  // 入力途中でもいつでもプレビューできる（未入力欄は空欄で表示される）
  const openPrint = async () => {
    setBusy('帳票を作成中…');
    try {
      const map = await ensurePhotos(report.sets.map(s => s.photoId).filter(Boolean));
      const holder = document.getElementById('print-content-holder');
      holder.innerHTML = buildPrintHTML(report, map);
      // 写真の読み込み完了を待つ（プレビュー直後に印刷しても白抜けしないように）。
      // ※ img.decode() は display:none の要素内だと永久に解決しないブラウザがあるため使わない
      await Promise.all([...holder.querySelectorAll('img')].map(im => im.complete ? null : new Promise(res => {
        const done = () => res();
        im.addEventListener('load', done, { once: true });
        im.addEventListener('error', done, { once: true });
        setTimeout(done, 3000); // 読み込めない画像で固まらないための保険
      })));
      setPrintOpen(true);
    } finally { setBusy(null); }
  };
  const closePrint = () => {
    setPrintOpen(false);
    const holder = document.getElementById('print-content-holder');
    holder.innerHTML = '';
  };
  const doPrint = () => window.print();

  const savePdf = async () => {
    setBusy('PDFを生成中…（写真の枚数により数十秒かかります）');
    const holder = document.getElementById('print-content-holder');
    const docsAll = [...holder.querySelectorAll('.doc')];
    const prevZooms = docsAll.map(d => d.style.zoom);
    docsAll.forEach(d => { d.style.zoom = '1'; }); // 等倍で取り込む（画質低下を防ぐ）
    try {
      const docs = holder.querySelectorAll('.doc');
      if (!docs.length) return;
      const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      for (let i = 0; i < docs.length; i++) {
        setBusy(`PDFを生成中… ${i + 1}/${docs.length}ページ`);
        await new Promise(r => setTimeout(r, 30)); // ページ間でUIスレッドに制御を返す
        const canvas = await html2canvas(docs[i], { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
        const img = canvas.toDataURL('image/jpeg', 0.9);
        if (i > 0) pdf.addPage();
        // 実寸比で貼付（コンテンツがA4を超えた場合は歪ませず末尾で切る）
        const imgHmm = canvas.height * 210 / canvas.width;
        pdf.addImage(img, 'JPEG', 0, 0, 210, imgHmm);
      }
      const name = `福祉用具相談報告書_${report.clientName || '無題'}様邸_${report.deliveryDate}.pdf`;
      pdf.save(name);
      showToast('PDFを保存しました（端末のダウンロードに保存されます）');
    } catch (err) {
      showToast(`PDF生成に失敗：${err.message}`, 'error');
    } finally { docsAll.forEach((d, i) => { d.style.zoom = prevZooms[i]; }); setBusy(null); }
  };

  // ---- データ移行（JSONエクスポート/インポート） ----
  const exportAll = async () => {
    setBusy('エクスポート中…');
    try {
      const photos = {};
      for (const r of reports) for (const s of r.sets) {
        if (s.photoId && !photos[s.photoId]) {
          const v = await idbGet(s.photoId);
          if (v) photos[s.photoId] = v;
        }
      }
      const payload = { app: 'taiyo-fukushi-report', version: 1, exportedAt: new Date().toISOString(), reports, master, photos };
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `福祉用具相談報告書_バックアップ_${todayISO()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
      showToast('エクスポートしました');
    } finally { setBusy(null); }
  };

  const importAll = async (file) => {
    if (!file) return;
    setBusy('インポート中…');
    try {
      const payload = JSON.parse(await file.text());
      if (!payload || payload.app !== 'taiyo-fukushi-report') throw new Error('このアプリのバックアップファイルではありません');
      // 写真: dataURL画像のみ受け入れ（不正な文字列の混入＝印刷HTMLへのXSS供給源を遮断）
      let photoCount = 0;
      for (const [id, v] of Object.entries(payload.photos || {})) {
        if (typeof id === 'string' && typeof v === 'string' && /^data:image\//.test(v) && v.length < 4 * 1024 * 1024) {
          await idbPut(id.slice(0, 60), v);
          photoCount++;
        }
      }
      // 報告書: 構造・型を強制してから取り込む
      const incoming = (Array.isArray(payload.reports) ? payload.reports : []).slice(0, 500).map(sanitizeImportedReport);
      setReports(list => {
        const map = new Map(list.map(r => [r.id, r]));
        for (const r of incoming) {
          const cur = map.get(r.id);
          if (!cur || (r.updatedAt || 0) > (cur.updatedAt || 0)) map.set(r.id, r);
        }
        return [...map.values()].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      });
      // マスタ: updatedAtが新しい側を採用（古いバックアップで最新の修正を潰さない）
      setMaster(list => {
        const map = new Map(list.map(m => [m.name, m]));
        for (const raw of (Array.isArray(payload.master) ? payload.master : []).slice(0, 2000)) {
          const m = {
            name: sanStr(raw && raw.name, 120), tais: sanStr(raw && raw.tais, 20),
            maker: sanStr(raw && raw.maker, 60),
            category: CATEGORIES.includes(raw && raw.category) ? raw.category : '',
            item: sanStr(raw && raw.item, 60),
            units: toInt(raw && raw.units), updatedAt: toInt(raw && raw.updatedAt),
          };
          if (!m.name) continue;
          const cur = map.get(m.name);
          if (!cur || (m.updatedAt || 0) > (cur.updatedAt || 0)) map.set(m.name, m);
        }
        return [...map.values()];
      });
      showToast(`インポートしました（報告書${incoming.length}件・写真${photoCount}枚）`);
    } catch (err) {
      showToast(`インポートに失敗：${err.message}`, 'error');
    } finally { setBusy(null); }
  };

  // ================= 画面 =================

  // ---- 一覧 ----
  const renderList = () => (
    <div className="max-w-3xl mx-auto p-4 pb-24">
      <header className="flex items-center gap-3 py-4">
        <div className="bg-blue-600 text-white rounded-lg p-2"><ClipboardList size={22} /></div>
        <div>
          <h1 className="text-lg font-bold text-slate-800">福祉用具相談報告書</h1>
          <p className="text-xs text-slate-500">{COMPANY_NAME}</p>
        </div>
        <button className="ml-auto text-slate-500 hover:text-slate-700 p-2" onClick={() => { prevViewRef.current = 'list'; setView('settings'); }} title="設定">
          <Settings size={20} />
        </button>
      </header>

      <button className={`${btn('emerald')} w-full justify-center py-3.5 text-base`} onClick={openNew}>
        <Plus size={18} /> 新しい報告書を作成
      </button>

      {/* 使い方（初めての人がまず見る導線） */}
      <button
        className="mt-2 w-full flex items-center gap-2 bg-white border border-slate-200 hover:border-blue-400 rounded-lg px-3 py-2.5 text-sm text-slate-700 shadow-sm transition"
        onClick={() => setView('help')}>
        <HelpCircle size={17} className="text-blue-600 shrink-0" />
        <span className="font-bold">使い方（4ステップ）</span>
        <span className="text-xs text-slate-500 hidden sm:inline">取り込む → 情報を確認 → 写真を足す → 印刷</span>
        <ChevronRight size={16} className="ml-auto text-slate-400 shrink-0" />
      </button>

      {Object.keys(drafts).length > 0 && (
        <div className="mt-2 space-y-1.5">

          <p className="text-[11px] text-slate-500 leading-relaxed mt-1.5">
            マスタから選ぶ＝過去に使った商品名をチェックして一括追加／
            特定福祉用具（入浴補助用具など）は単位数報告書に載らないため専用ボタンから追加します
          </p>
        </section>

        {/* 帳票の表示オプション */}
        <section className="mt-3 bg-white rounded-lg border border-slate-200 shadow-sm p-3">
          <div className="text-[11px] font-bold text-slate-500 mb-2">帳票に載せるもの</div>
          <div className="flex flex-wrap gap-x-5 gap-y-2">
            <label className="flex items-center gap-1.5 text-xs text-slate-700 cursor-pointer">
              <input type="checkbox" className="w-4 h-4 accent-blue-600" checked={!!report.showTotal}
                onChange={e => updateReport({ showTotal: e.target.checked })} />
              合計単位数を表示する
            </label>
            <label className={`flex items-center gap-1.5 text-xs cursor-pointer ${report.importedRows.length ? 'text-slate-700' : 'text-slate-300'}`}>
              <input type="checkbox" className="w-4 h-4 accent-blue-600" disabled={!report.importedRows.length}
                checked={!!report.showImportTable}
                onChange={e => updateReport({ showImportTable: e.target.checked })} />
              取込データの一覧表を付ける
            </label>
            <label className={`flex items-center gap-1.5 text-xs cursor-pointer ${report.importedRows.length && report.showImportTable ? 'text-slate-700' : 'text-slate-300'}`}>
              <input type="checkbox" className="w-4 h-4 accent-blue-600"
                disabled={!report.importedRows.length || !report.showImportTable}
                checked={!!report.highlightDelivered}
                onChange={e => updateReport({ highlightDelivered: e.target.checked })} />
              一覧表で納品分に色を付ける
            </label>
          </div>
        </section>

        {pendingDoc && !pdfCands && (
          <div className="mt-2 bg-amber-50 border border-amber-300 rounded-md p-3 flex items-center gap-3 text-sm">
            <AlertTriangle className="text-amber-500 shrink-0" size={18} />
            <span className="flex-1 text-amber-800 text-xs md:text-sm">
              「{pendingDoc.name}」からテキストを抽出できませんでした（画像として保存されたPDFの可能性）。
              {!AI_ENABLED && 'お手数ですが手入力でご登録ください。'}
            </span>
            {AI_ENABLED && (
              <button className={btn('purple')} onClick={aiReadPendingDoc}><Wand2 size={15} /> AIで読み取る</button>
            )}
            <button className="text-slate-400 hover:text-slate-600" onClick={() => setPendingDoc(null)}><X size={16} /></button>
          </div>
        )}

        {/* 明細カード */}
        <section className="mt-3 grid grid-cols-1 md:grid-cols-2 gap-3">
          {report.sets.map((s, idx) => (
            <SetCard
              key={s.id}
              s={s}
              idx={idx}
              photo={s.photoId ? (photoCache[s.photoId] || null) : null}
              onUpdate={updateSet}
              onRemove={removeSet}
              onRecognize={onRecognizeStable}
              onAttach={onAttachStable}
              onMasterMatch={onMasterMatchStable}
              onDropFiles={onDropFilesStable}
            />
          ))}

          <button
            className="min-h-[120px] border-2 border-dashed border-slate-300 rounded-lg flex flex-col items-center justify-center text-slate-400 hover:border-emerald-400 hover:text-emerald-600 gap-1 text-sm font-bold bg-white/50"
            onClick={() => setReport(r => ({ ...r, updatedAt: Date.now(), sets: [...r.sets, emptySet()] }))}>
            <Plus size={22} /> 明細を追加（写真なし）
          </button>
        </section>

        {/* 報告事項 */}
        <section className="mt-3 bg-white rounded-lg border border-slate-200 shadow-sm p-3.5">
          <div className="flex items-center gap-2 mb-2">
            <h2 className="text-sm font-bold text-slate-700">報告事項</h2>
            {AI_ENABLED && (
              <button className="ml-auto text-[11px] font-bold text-purple-700 bg-purple-50 border border-purple-200 rounded px-2 py-1 flex items-center gap-1 hover:bg-purple-100"
                onClick={draftRemarks}><Wand2 size={12} /> AIで下書き</button>
            )}
          </div>
          <textarea
            className="w-full border border-slate-300 rounded-md text-sm p-2.5 min-h-[110px] focus:outline-none focus:ring-2 focus:ring-blue-400"
            value={report.remarks} placeholder="納品・調整・説明の内容、利用状況、ケアマネジャーへの申し送り事項など"
            onChange={e => updateReport({ remarks: e.target.value })} />
          <div className="flex flex-wrap gap-1.5 mt-1.5">
            {TEMPLATE_PHRASES.map((t, i) => (
              <button key={i}
                className="text-[11px] text-slate-600 bg-slate-100 hover:bg-blue-100 hover:text-blue-700 rounded-full px-2.5 py-1 border border-slate-200"
                title={t}
                onClick={() => updateReport({ remarks: report.remarks ? report.remarks + '\n' + t : t })}>
                {t.slice(0, 24)}…
              </button>
            ))}
          </div>
        </section>

        {/* マスタ候補（datalist） */}
        <datalist id="master-list">
          {master.map(m => <option key={m.name} value={m.name} />)}
        </datalist>

        {/* 下部固定アクションバー */}
        <div className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t border-slate-200 p-2.5 z-40 no-print">
          <div className="max-w-4xl mx-auto flex gap-2">
            <button className={`${btn('blue')} flex-1 justify-center`} onClick={saveReport}>
              <Save size={16} /> 保存
            </button>
            <button className={`${btn('sky')} flex-1 justify-center`} onClick={openPrint}>
              <Printer size={16} /> 印刷プレビュー
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ---- PDF候補ピッカー ----
  const renderPdfCands = () => (
    <div className="fixed inset-0 z-[70] bg-slate-900/60 flex items-center justify-center p-3">
      <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col">
        <div className="flex items-center gap-2 px-4 py-3 border-b border-slate-200">
          <FileText size={17} className="text-indigo-600" />
          <div className="flex-1 min-w-0">
            <h2 className="text-sm font-bold text-slate-800">抽出された商品候補</h2>
            <p className="text-[11px] text-slate-500 truncate">{pdfCands.source}</p>
          </div>
          <button className="text-slate-400 hover:text-slate-600 p-1" onClick={() => { setPdfCands(null); setPendingDoc(null); }}><X size={18} /></button>
        </div>
        <div className="px-4 py-2 flex gap-2 text-xs border-b border-slate-100">
          <button className="text-blue-600 font-bold" onClick={() => setPdfCands(c => ({ ...c, items: c.items.map(i => ({ ...i, checked: true })) }))}>全選択</button>
          <button className="text-slate-500" onClick={() => setPdfCands(c => ({ ...c, items: c.items.map(i => ({ ...i, checked: false })) }))}>全解除</button>
          <span className="ml-auto text-slate-500">{pdfCands.items.filter(i => i.checked).length} / {pdfCands.items.length} 件選択中</span>
        </div>
        <div className="overflow-y-auto flex-1 divide-y divide-slate-100">
          {pdfCands.items.map((c, i) => (
            <label key={i} className="flex items-center gap-2.5 px-4 py-2 hover:bg-blue-50/60 cursor-pointer">
              <input type="checkbox" className="w-4 h-4 accent-blue-600 shrink-0" checked={c.checked}
                onChange={e => setPdfCands(pc => ({ ...pc, items: pc.items.map((x, j) => j === i ? { ...x, checked: e.target.checked } : x) }))} />
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-1.5">
                  {c.kubun && (
                    <span className={`text-[10px] font-bold rounded px-1.5 py-0.5 shrink-0 ${c.kubun === '納品' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-200 text-slate-600'}`}>{c.kubun}</span>
                  )}
                  <span className="text-sm text-slate-800 truncate font-bold">{c.productName}</span>
                </div>
                {c.item && <div className="text-[11px] text-slate-500 truncate">{c.category === CATEGORY_PREVENTION ? '予防・' : c.category === CATEGORY_SPECIFIC ? '特定・' : ''}{c.item}</div>}
              </div>
              <span className="text-xs text-slate-500 tabular-nums shrink-0">{c.tais || 'TAIS未検出'}</span>
              <span className="text-xs text-slate-600 tabular-nums w-20 text-right shrink-0">
                {c.units ? (c.category === CATEGORY_SPECIFIC ? `¥${c.units.toLocaleString()}` : `${c.units.toLocaleString()}単位`) : '―'}
              </span>
            </label>
          ))}
        </div>
        <div className="p-3 border-t border-slate-200 flex flex-wrap gap-2">
          <button className={`${btn('slate')} flex-1 justify-center`} onClick={() => { setPdfCands(null); setPendingDoc(null); }}>キャンセル</button>
          {AI_ENABLED && pendingDoc && settings.apiKey && (
            <button className={`${btn('purple')} flex-1 justify-center`} title="抽出結果の精度が低い場合、AIでページ画像から読み取り直します"
              onClick={() => { setPdfCands(null); aiReadPendingDoc(); }}>
              <Wand2 size={15} /> AIで読み取り直す
            </button>
          )}
          <button className={`${btn('indigo')} flex-[2] justify-center`} onClick={applyCandidates}>
            <Plus size={16} /> 選択した商品を明細へ反映
          </button>
        </div>
      </div>
    </div>
  );

  // ---- マスタから選ぶダイアログ（種目別・チェックで報告書へ追加） ----
  const renderMasterPick = () => {
    const count = Object.values(masterPick).filter(Boolean).length;
    return (
      <div className="fixed inset-0 z-[70] bg-slate-900/60 flex items-center justify-center p-3">
        <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col">
          <div className="flex items-center gap-2 px-4 py-3 border-b border-slate-200">
            <BookOpen size={17} className="text-teal-600" />
            <div className="flex-1 min-w-0">
              <h2 className="text-sm font-bold text-slate-800">マスタから選ぶ</h2>
              <p className="text-[11px] text-slate-500">チェックした商品を報告書に追加します（種目別）</p>
            </div>
            <button className="text-slate-400 hover:text-slate-600 p-1" onClick={() => setMasterPick(null)}><X size={18} /></button>
          </div>
          <div className="overflow-y-auto flex-1">
            {masterGroups.map(g => (
              <div key={g.item}>
                <div className="sticky top-0 bg-teal-50 text-teal-800 text-xs font-bold px-4 py-1.5 border-y border-teal-100">
                  {g.item}（{g.items.length}）
                </div>
                {g.items.map(m => (
                  <label key={m.name} className="flex items-center gap-2.5 px-4 py-2 hover:bg-teal-50/60 cursor-pointer border-b border-slate-50">
                    <input type="checkbox" className="w-4 h-4 accent-teal-600 shrink-0" checked={!!masterPick[m.name]}
                      onChange={e => setMasterPick(p => ({ ...p, [m.name]: e.target.checked }))} />
                    <span className="flex-1 min-w-0 text-sm text-slate-800 truncate font-bold">{m.name}</span>
                    <span className="text-xs text-slate-500 tabular-nums shrink-0">{m.tais || '―'}</span>
                    <span className="text-xs text-slate-600 tabular-nums w-20 text-right shrink-0">
                      {m.units ? (m.category === CATEGORY_SPECIFIC ? `¥${m.units.toLocaleString()}` : `${m.units.toLocaleString()}単位`) : ''}
                    </span>
                  </label>
                ))}
              </div>
            ))}
          </div>
          <div className="p-3 border-t border-slate-200 flex gap-2">
            <button className={`${btn('slate')} flex-1 justify-center`} onClick={() => setMasterPick(null)}>キャンセル</button>
            <button className={`${btn('teal')} flex-[2] justify-center`} onClick={applyMasterPick}>
              <Plus size={16} /> 選択した{count > 0 ? `${count}件` : '商品'}を報告書へ追加
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ---- 印刷プレビュー ----
  const renderPrintOverlay = () => {
    // 未入力でもプレビューは開ける。提出前に気づけるよう不足項目だけ知らせる
    const missing = [];
    if (report && !report.clientName.trim()) missing.push('利用者名');
    if (report && !report.office) missing.push('営業所');
    if (report && !report.deliveryDate) missing.push('納品日');
    // 重なり順の注意: ボタンを背景レイヤ(z-60)の子にすると、その中でz-65にしても
    // 実効的には60止まりになり、プレビュー本体(#print-content-holder, z-61)に
    // 覆われてクリックできなくなる。背景とボタンは兄弟にして、ボタンをz-80に置く。
    return (
    <>
      <div className="fixed inset-0 z-[60] bg-slate-700/90 no-print" />
      <div className="fixed top-3 right-3 z-[80] flex gap-2 no-print">
        <button className={btn('sky')} onClick={doPrint}><Printer size={16} /> 印刷</button>
        <button className={btn('indigo')} onClick={savePdf}><FileDown size={16} /> PDF保存</button>
        <button className={btn('rose')} onClick={closePrint}><X size={16} /> 閉じる</button>
      </div>
      {missing.length > 0 && (
        <div className="fixed top-3 left-3 z-[80] no-print bg-amber-50 border border-amber-400 text-amber-800 rounded-md px-3 py-2 text-xs font-bold shadow-lg max-w-[45vw]">
          <div className="flex items-center gap-1.5"><AlertTriangle size={14} className="shrink-0" />未入力：{missing.join('・')}</div>
          <div className="font-normal mt-0.5">プレビューはこのまま確認できます（提出前にご入力ください）</div>
        </div>
      )}
    </>
    );
  };

  // printOpen中は holder を画面に表示
  // A4(210mm≒794px)が画面幅に収まるよう縮小率を決める（スマホでも全体が読める）
  // 縮小は各A4ページに掛ける（固定レイヤ自体に掛けると画面を覆えなくなる）
  const fitPreview = useCallback(() => {
    const holder = document.getElementById('print-content-holder');
    if (!holder) return;
    const avail = Math.max(260, window.innerWidth - 20);
    const z = String(Math.min(1, avail / 794));
    holder.querySelectorAll('.doc').forEach(d => { d.style.zoom = z; });
  }, []);

  useEffect(() => {
    if (!printOpen) return;
    fitPreview();
    window.addEventListener('resize', fitPreview);
    return () => window.removeEventListener('resize', fitPreview);
  }, [printOpen, fitPreview]);

  useEffect(() => {
    const holder = document.getElementById('print-content-holder');
    const apply = (o) => Object.assign(holder.style, o);
    if (printOpen) {
      // ビューポートを覆う固定レイヤにして、その中でA4ページをスクロール表示する。
      // （通常フロー(position:relative)だと編集画面の高さ分だけ下にずれ、
      //   プレビューが画面外になって「押しても何も見えない」状態になる）
      apply({
        display: 'block', position: 'fixed', top: '0', left: '0', right: '0', bottom: '0',
        zIndex: '61', overflow: 'auto', padding: '58px 8px 24px', margin: '0',
        width: 'auto', maxWidth: 'none',
      });
      document.body.style.overflow = 'hidden'; // 背面のスクロールを止める
      // 用紙の外（余白）をクリックしたら閉じる
      const onBgClick = (e) => { if (e.target === holder) closePrint(); };
      holder.addEventListener('click', onBgClick);
      return () => { holder.removeEventListener('click', onBgClick); document.body.style.overflow = ''; };
    } else {
      apply({
        display: '', position: '', top: '', left: '', right: '', bottom: '',
        zIndex: '', overflow: '', padding: '', margin: '', width: '', maxWidth: '', zoom: '',
      });
      document.body.style.overflow = '';
    }
    return () => { document.body.style.overflow = ''; };
  }, [printOpen]);

  return (
    <div>
      {view === 'list' && renderList()}
      {view === 'help' && renderHelp()}
      {view === 'settings' && renderSettings()}
      {view === 'edit' && report && renderEdit()}
      {pdfCands && renderPdfCands()}
      {masterPick && renderMasterPick()}
      {printOpen && renderPrintOverlay()}
      <BusyOverlay busy={busy} />
      <Toast toast={toast} />

      {/* 非表示のファイル入力 */}
      <input ref={fileInputRef} type="file" accept="image/*" multiple className="hidden"
        onChange={e => { handleFiles(e.target.files, attachTargetRef.current); e.target.value = ''; }} />
      <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" className="hidden"
        onChange={e => { handleFiles(e.target.files, attachTargetRef.current); e.target.value = ''; }} />
      <input ref={pdfInputRef} type="file" className="hidden"
        accept=".pdf,.xlsx,.xlsm,.csv,.tsv,.txt,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv"
        onChange={e => { handleImportFile(e.target.files && e.target.files[0]); e.target.value = ''; }} />
      <input ref={importInputRef} type="file" accept="application/json" className="hidden"
        onChange={e => { importAll(e.target.files && e.target.files[0]); e.target.value = ''; }} />
    </div>
  );
}

// デバッグ用フック（localStorageでフラグを立てた端末のみ公開）
if (localStorage.getItem('taiyo_fukushi_debug') === '1') {
  window.__debugPdf = { pdfToLines, parseCandidatesFromLines, parseRentalUnitReport, normalizeItemLabel };
}

// エラー計測（QAチェック用）
window.__appErrors = [];
window.addEventListener('error', (e) => window.__appErrors.push(String(e.message)));
window.addEventListener('unhandledrejection', (e) => window.__appErrors.push(String(e.reason)));

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
